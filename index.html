<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Acceso QR</title>
  <!-- Enlace local a la librería guardada en tu GitHub -->
  <script src="./html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #1565c0;
      margin-bottom: 20px;
    }
    /* Contenedores de Vistas */
    #vista-escaneo, #vista-resultado, #vista-resultado-devolver {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }
    #reader {
      width: 100%;
      min-height: 300px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }
    #resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
      min-height: 25px;
    }
    .green {
      background: #c8e6c9;
      color: #1b5e20;
    }
    .red {
      background: #ffcdd2;
      color: #b71c1c;
    }
    .orange {
      background: #ffe0b2;
      color: #e65100;
    }
    /* Estilos del Formulario de Datos Autorizados */
    .tarjeta-autorizado {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-top: 8px solid #2e7d32;
      margin-top: 15px;
    }
    .tarjeta-devolver {
      border-top-color: #e65100;
    }
    .badge-exito {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 15px;
    }
    .badge-devolver {
      background: #fff3e0;
      color: #e65100;
    }
    .info-grupo {
      text-align: left;
      margin-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 6px;
    }
    .info-label {
      font-size: 12px;
      color: #757575;
      text-transform: uppercase;
      font-weight: bold;
    }
    .info-valor {
      font-size: 18px;
      color: #212121;
      font-weight: 500;
    }
    /* Contenedor e Imagen de la Cédula */
    .contenedor-foto {
      margin: 15px 0;
      border-radius: 8px;
      overflow: hidden;
      background: #eee;
      border: 1px solid #ddd;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .foto-cedula {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }
    /* Botones */
    .btn-accion {
      color: white;
      padding: 15px 30px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 15px;
      transition: background 0.2s;
    }
    .btn-encender {
      background: #1565c0;
      margin-bottom: 15px;
    }
    .btn-encender:hover {
      background: #0d47a1;
    }
    .btn-devolver {
      background: #e65100;
      margin-bottom: 10px;
    }
    .btn-devolver:hover {
      background: #b23c17;
    }
    .btn-volver {
      background: #2e7d32;
    }
    .btn-volver:hover {
      background: #1b5e20;
    }
    .btn-cancelar { 
      background: #757575; 
    }
    .btn-cancelar:hover {
      background: #616161;
    }
    /* Menú de botones */
    #menu-botones {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>CONTROL DE ACCESO QR</h1>

  <!-- VISTA 1: PANTALLA DE ESCANEO CON MENÚ DE BOTONES -->
  <div id="vista-escaneo">
    <div id="menu-botones">
      <button class="btn-accion btn-encender" onclick="activarModo('escanearAcceso')">ESCANEAR INGRESO</button>
      <button class="btn-accion btn-devolver" onclick="activarModo('escanearDevolver')">ESCANEAR SALIDA</button>
    </div>
    
    <!-- Botón para apagar la cámara y volver al menú principal de botones -->
    <button class="btn-accion btn-cancelar" id="btnCancelar" style="display: none; margin-bottom: 15px;" onclick="cancelarEscaneo()">CANCELAR ESCANEO</button>
    
    <div id="reader"></div>
    <div id="resultado"></div>
  </div>

  <!-- VISTA 2: FORMULARIO DE ACCESO AUTORIZADO -->
  <div id="vista-resultado" style="display: none;">
    <div class="tarjeta-autorizado">
      <div class="badge-exito">✓ ACCESO AUTORIZADO</div>
      
      <div class="contenedor-foto">
        <img id="cedula-img" class="foto-cedula" src="" alt="Fotografía Cédula">
      </div>

      <div class="info-grupo">
        <div class="info-label">Nombre Completo</div>
        <div id="cedula-nombre" class="info-valor">-</div>
      </div>

      <div class="info-grupo">
        <div class="info-label">Documento de Identidad</div>
        <div id="cedula-num" class="info-valor">-</div>
      </div>

      <div class="info-grupo">
        <div class="info-label">Turno Asignado</div>
        <div id="cedula-turno" class="info-valor">-</div>
      </div>

      <div class="info-grupo">
        <div class="info-label">Area Asignada</div>
        <div id="cedula-area" class="info-valor">-</div>
      </div>

      <button class="btn-accion btn-volver" onclick="regresarAlMenuPrincipal()">VOLVER A ESCANEAR</button>
    </div>
  </div>

  <!-- VISTA 3: PANTALLA DE CONFIRMACIÓN DE SALIDA -->
  <div id="vista-resultado-devolver" style="display: none;">
    <div class="tarjeta-autorizado tarjeta-devolver">
      <div id="devolver-mensaje-badge" class="badge-exito badge-devolver">-</div>
      
      <div class="contenedor-foto">
        <img id="devolver-img" class="foto-cedula" src="" alt="Fotografía Cédula">
      </div>

      <div class="info-grupo">
        <div class="info-label">Nombre Completo</div>
        <div id="devolver-nombre" class="info-valor">-</div>
      </div>

      <div class="info-grupo">
        <div class="info-label">Documento de Identidad</div>
        <div id="devolver-cedula" class="info-valor">-</div>
      </div>

      <div class="info-grupo">
        <div class="info-label">Turno</div>
        <div id="devolver-turno" class="info-valor">-</div>
      </div>

      <button class="btn-accion btn-volver" onclick="regresarAlMenuPrincipal()">VOLVER A ESCANEAR</button>
    </div>
  </div>

  <script>
    // URL DE TU IMPLEMENTACIÓN DE GOOGLE APPS SCRIPT 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw9jvI6Gen--G9gYtu2d8IWLK0jKmT0jHitFEXzCu_ubsVAwQp_D7ig5lddsX8fbebH/exec";
    let html5QrcodeScanner = null;
    let procesandoScan = false;
    let modoAccionActual = "";

    window.onerror = function(msg, url, linenumber) {
      const r = document.getElementById("resultado");
      r.className = "red";
      r.innerHTML = "Error interno: " + msg + " (Línea: " + linenumber + ")";
      return false;
    };

    function activarModo(modo) {
      modoAccionActual = modo;
      document.getElementById("menu-botones").style.display = "none";
      document.getElementById("btnCancelar").style.display = "inline-block";
      verificarYArrancar();
    }

    function verificarYArrancar() {
      const r = document.getElementById("resultado");
      if (typeof Html5Qrcode === "undefined") {
        r.className = "red";
        r.innerHTML = "Error local: El archivo de la librería no se cargó correctamente desde GitHub.";
        return;
      }
      iniciarVideoTransmision();
    }

    function iniciarVideoTransmision() {
      const r = document.getElementById("resultado");
      r.className = "";
      r.innerHTML = "Conectando con la cámara del dispositivo...";
      
      try {
        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = {};
        
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          config,
          codigoDetectadoEnVivo
        ).then(() => {
          r.className = "green";
          r.innerHTML = "Cámara encendida. Enfoque un código QR.";
        }).catch(err => {
          html5QrcodeScanner.start(
            undefined,
            config,
            codigoDetectadoEnVivo
          ).then(() => {
            r.className = "green";
            r.innerHTML = "Cámara encendida. Si es la frontal, gire el teléfono.";
          }).catch(errFinal => {
            r.className = "red";
            r.innerHTML = "Acceso denegado o error de hardware: " + errFinal;
            document.getElementById("menu-botones").style.display = "block";
            document.getElementById("btnCancelar").style.display = "none";
          });
        });
      } catch (exception) {
        r.className = "red";
        r.innerHTML = "Fallo en ejecución: " + exception.message;
      }
    }

    function codigoDetectadoEnVivo(decodedText) {
      if (procesandoScan) return;
      procesandoScan = true;
      
      const r = document.getElementById("resultado");
      r.className = "";
      r.innerHTML = "Consultando validez del código...";
      
      html5QrcodeScanner.stop().then(() => {
        const viejoScript = document.getElementById("jsonp-request");
        if (viejoScript) viejoScript.remove();
        
        // Convertir modo de la interfaz a acciones del backend
        const accionBackend = modoAccionActual === "escanearAcceso" ? "buscarAsignar" : "devolver";
        
        const script = document.createElement("script");
        script.id = "jsonp-request";
        script.src = WEB_APP_URL + "?codigoQR=" + encodeURIComponent(decodedText) + "&accion=" + accionBackend + "&callback=procesarRespuestaServidorJSONP";
        
        script.onerror = function() {
          maniobrarErrorServidor("Error crítico de conexión con Google.");
        };
        document.body.appendChild(script);
      }).catch(err => {
        procesandoScan = false;
      });
    }

    // RETORNO GLOBAL JSONP
    window.procesarRespuestaServidorJSONP = function(data) {
      const script = document.getElementById("jsonp-request");
      if (script) script.remove();
      
      const r = document.getElementById("resultado");
      
      if (data.ok) {
        r.innerHTML = "";
        r.className = "";
        
        // VISTA A: Acceso Autorizado (Ingreso)
        if (modoAccionActual === "escanearAcceso") {
          document.getElementById("cedula-nombre").innerText = data.nombre || "No especificado";
          document.getElementById("cedula-num").innerText = data.cedula || "No especificado";
          document.getElementById("cedula-turno").innerText = data.turno || "No especificado";
          document.getElementById("cedula-area").innerText = data.area || "No especificado";
          
          const imgElement = document.getElementById("cedula-img");
          if (data.imagenCedula) {
            imgElement.src = data.imagenCedula;
            imgElement.style.display = "block";
          } else {
            imgElement.style.display = "none";
          }

          document.getElementById("vista-escaneo").style.display = "none";
          document.getElementById("vista-resultado").style.display = "block";

        // VISTA B: Confirmar Devolución
        } else if (modoAccionActual === "escanearDevolver") {
          document.getElementById("devolver-mensaje-badge").innerText = "✓ SALIDA REGISTRADA";
          document.getElementById("devolver-nombre").innerText = data.nombre || "No especificado";
          document.getElementById("devolver-cedula").innerText = data.cedula || "No especificado";
          document.getElementById("devolver-turno").innerText = data.turno || "No especificado";
          
          const imgElement = document.getElementById("devolver-img");
          if (data.imagenCedula) {
            imgElement.src = data.imagenCedula;
            imgElement.style.display = "block";
          } else {
            imgElement.style.display = "none";
          }

          document.getElementById("vista-escaneo").style.display = "none";
          document.getElementById("vista-resultado-devolver").style.display = "block";
        }
      } else {
        // ERROR: Mantiene la vista de escaneo y muestra el aviso del servidor
        r.className = data.color || "red";
        r.innerHTML = `<strong>${data.mensaje || "Error"}</strong><br>
          ${data.nombre ? 'Nombre: ' + data.nombre + '<br>' : ''} 
          ${data.turno ? 'Turno: ' + data.turno + '<br>' : ''}
          ${data.area ? 'Area: ' + data.area : ''}`;
        
        setTimeout(() => {
          r.innerHTML = "";
          r.className = "";
          procesandoScan = false;
          iniciarVideoTransmision();
        }, 8000);
      }
    };

    function maniobrarErrorServidor(mensaje) {
      const r = document.getElementById("resultado");
      r.className = "red";
      r.innerHTML = "<strong>" + mensaje + "</strong>";
      setTimeout(() => {
        r.innerHTML = "";
        r.className = "";
        procesandoScan = false;
        iniciarVideoTransmision();
      }, 8000);
    }

    function cancelarEscaneo() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => { 
          regresarAlMenuPrincipal(); 
        }).catch(() => { 
          regresarAlMenuPrincipal(); 
        });
      } else {
        regresarAlMenuPrincipal();
      }
    }

    function regresarAlMenuPrincipal() {
      procesandoScan = false;
      modoAccionActual = "";
      
      // Limpiar formulario de acceso
      document.getElementById("cedula-nombre").innerText = "-";
      document.getElementById("cedula-num").innerText = "-";
      document.getElementById("cedula-turno").innerText = "-";
      document.getElementById("cedula-area").innerText = "-";
      document.getElementById("cedula-img").src = "";
      
      // Limpiar formulario de devolución
      document.getElementById("devolver-nombre").innerText = "-";
      document.getElementById("devolver-cedula").innerText = "-";
      document.getElementById("devolver-turno").innerText = "-";
      document.getElementById("devolver-img").src = "";
      
      // Limpiar resultado
      const r = document.getElementById("resultado");
      r.innerHTML = "";
      r.className = "";
      
      // Volver a vista principal
      document.getElementById("vista-resultado").style.display = "none";
      document.getElementById("vista-resultado-devolver").style.display = "none";
      document.getElementById("btnCancelar").style.display = "none";
      document.getElementById("menu-botones").style.display = "block";
      document.getElementById("vista-escaneo").style.display = "block";
    }
  </script>
</body>
</html>
